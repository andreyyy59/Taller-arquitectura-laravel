services:
  - type: web
    name: budget-app
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: budget-db
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: budget-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: budget-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: budget-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: budget-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: budget-db
          property: password
      - key: APP_URL
        sync: false

databases:
  - name: budget-db
    plan: free
